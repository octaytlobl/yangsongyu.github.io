<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>杨崧雨 · 作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        /* 样式保持不变（为了简洁，此处省略，实际代码中保留原有全部样式） */
        /* 您需要将原有样式完整保留，这里仅示意新增的导出按钮样式 */
        .export-code {
            background: #1e1e1e;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow: auto;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <!-- 此处为原有 HTML 结构，保持不变 -->
    <!-- ... -->

    <!-- 新增导出数据模态框 -->
    <div id="exportModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>📤 导出数据（用于 GitHub 更新）</h3>
                <button class="close-modal-btn" id="closeExportBtn">&times;</button>
            </div>
            <p style="margin-bottom: 12px;">复制以下代码，打开 GitHub 仓库中的 <code>index.html</code>，找到 <code>DEFAULT_DATA</code> 的定义并替换为下方内容：</p>
            <div class="export-code" id="exportCodeBlock"></div>
            <div style="text-align: right; margin-top: 16px;">
                <button id="copyExportBtn">📋 复制代码</button>
                <button id="closeExportBtn2" class="secondary">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 原有所有 JavaScript 代码，但需要增加导出功能
        // 此处仅展示新增部分，实际需要整合到原代码中

        // 在原 init() 函数中增加导出按钮事件
        // 在原 adminModal 中增加“导出数据”按钮
        // 在原管理模态框内容中添加按钮：
        // <button type="button" id="exportDataBtn">📤 导出数据（用于更新 GitHub）</button>

        // 导出功能实现
        function showExportModal() {
            // 生成 DEFAULT_DATA 的字符串表示
            const exportData = {
                name: appData.name,
                bio: appData.bio,
                contact: appData.contact,
                skills: appData.skills,
                works: appData.works,
                avatar: appData.avatar  // 头像 base64，可能很大，但保留
            };
            const exportStr = JSON.stringify(exportData, null, 2);
            const codeBlock = document.getElementById('exportCodeBlock');
            codeBlock.innerText = `const DEFAULT_DATA = ${exportStr};`;
            document.getElementById('exportModal').style.display = 'flex';
        }

        // 在 openAdminModal 中确保“导出数据”按钮已添加
        // 原管理模态框内容中需包含此按钮（见下方修改后的 HTML 结构）

        // 关闭导出模态框
        function closeExportModal() {
            document.getElementById('exportModal').style.display = 'none';
        }

        // 复制代码
        function copyExportCode() {
            const code = document.getElementById('exportCodeBlock').innerText;
            navigator.clipboard.writeText(code).then(() => {
                showToast('✅ 代码已复制，请到 GitHub 仓库中替换 DEFAULT_DATA');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        // 在初始化时绑定导出按钮事件（需在 DOM 加载后）
        // 注意：导出按钮需要放在管理模态框内，我们将在下方 HTML 中体现
    </script>
</body>
</html>
