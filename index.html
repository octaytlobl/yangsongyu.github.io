    // 预设个人信息（与之前网站一致）
    const DEFAULT_PROFILE = {

        contact: "📞 13436664086\n📧 920963242@qq.com\n📍 北京 · 30岁",
        skills: "Final Cut Pro X, Premiere Pro, DaVinci Resolve, After Effects, Runway, 即梦, Pika, 可灵, Midjourney, Stable Diffusion, Topaz, AI配音/AI配乐",
        avatar: null
    };
    const DEFAULT_WORKS = [
        {
            title: "中国中车微电影《废材的逆袭》",

        },

            embedCode: '<iframe src="https://player.youku.com/embed/示例请替换" frameborder="0" allowfullscreen></iframe>',

    // ---------- 辅助函数 ----------
    function showToast(message, duration = 3000) {
        const toast = document.createElement('div');
        toast.innerText = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.right = '32px';
        toast.style.background = '#f5b042';
        toast.style.color = '#0a0a0a';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '0.9rem';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '1001';
        toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }

    // 匿名登录
    async function ensureLogin() {
        const auth = app.auth();
        try {
            const loginState = await auth.getLoginState();
            if (!loginState) await auth.signInAnonymously();
        } catch (err) { console.error('登录失败', err); }
    }

    // 加载个人信息（若没有则自动创建预设内容）
    async function loadProfile() {
        try {
            const res = await db.collection('profile').get();
            if (res.data && res.data.length > 0) {
                const p = res.data[0];
                appData.name = p.name || '';
                appData.bio = p.bio || '';
                appData.contact = p.contact || '';
                appData.skills = p.skills || '';
                appData.avatar = p.avatar || null;
            } else {
                await db.collection('profile').add(DEFAULT_PROFILE);
                Object.assign(appData, DEFAULT_PROFILE);
            }
        } catch (err) { console.error(err); }
    }

    // 加载作品列表（若没有则自动创建预设作品）
    async function loadWorks() {
        try {
            const res = await db.collection('works').get();
            if (res.data && res.data.length > 0) {
                appData.works = res.data;
            } else {
                for (const w of DEFAULT_WORKS) {
                    await db.collection('works').add(w);
                }
                const newRes = await db.collection('works').get();
                appData.works = newRes.data || [];
            }
        } catch (err) { console.error(err); }
    }

        try {
            const res = await db.collection('profile').get();
            if (res.data && res.data.length > 0) {
                const id = res.data[0]._id;
                await db.collection('profile').doc(id).update(profile);
            } else {
                await db.collection('profile').add(profile);
            }
            return true;
        } catch (err) { return false; }
    }
    // 保存作品
    async function saveWorkToCloud(work, isNew) {
        if (!isAdmin) return false;
        try {
            if (isNew) {
                const { id, ...rest } = work;
                await db.collection('works').add(rest);
            } else {
                await db.collection('works').doc(work.id).update({
                    title: work.title,
                    category: work.category,
                    description: work.description,
                    embedCode: work.embedCode,
                    cover: work.cover
                });
            }
            return true;
        } catch (err) { return false; }
    }
    async function deleteWorkFromCloud(workId) {
        if (!isAdmin) return false;
        try {
            await db.collection('works').doc(workId).remove();
            return true;
        } catch (err) { return false; }
    }

    // 渲染前端界面
    function renderAvatar() {
        const img = document.getElementById("avatarImg");
        const placeholder = document.getElementById("avatarPlaceholder");
        if (appData.avatar && appData.avatar.startsWith("data:image")) {
            img.src = appData.avatar;
            img.style.display = "block";
            placeholder.style.display = "none";
        } else {
            img.style.display = "none";
            placeholder.style.display = "flex";
        }
    }
    function renderFrontend() {
        document.getElementById("displayName").innerText = appData.name;
        document.getElementById("displayBio").innerHTML = appData.bio.replace(/\n/g, '<br>');
        const contactLines = appData.contact.split('\n').filter(l => l.trim());
        const contactHtml = contactLines.map(line => {
            let text = escapeHtml(line);
            if (line.includes('@')) return `<a href="mailto:${line.replace(/[^\w@.-]/g, '')}">${text}</a>`;
            else if (line.match(/1[3-9]\d{9}/)) {
                const phone = line.match(/1[3-9]\d{9}/)[0];
                return `<a href="tel:${phone}">${text}</a>`;
            }
            return `<span>${text}</span>`;
        }).join('');
        document.getElementById("displayContact").innerHTML = contactHtml;
        const skillList = appData.skills.split(/[ ,，]+/).filter(s => s.trim());
        document.getElementById("displaySkills").innerHTML = skillList.map(s => `<span class="skill-badge">${escapeHtml(s.trim())}</span>`).join('');
        const filterBar = document.getElementById("filterBar");
        filterBar.innerHTML = `<button class="filter-btn active" data-cat="all">全部</button>` +
            CATEGORIES.map(cat => `<button class="filter-btn" data-cat="${cat}">${cat}</button>`).join('');
        attachFilterEvents();
        renderWorks('all');
        renderAvatar();
    }
    const CATEGORIES = ["tvc广告","宣传片","预告片","微电影","纪录片","电视节目","短视频","aigc视频"];
    function attachFilterEvents() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.removeEventListener('click', filterHandler);
            btn.addEventListener('click', filterHandler);
        });
    }
    function filterHandler(e) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderWorks(e.target.dataset.cat);
    }
    function renderWorks(category) {
        const grid = document.getElementById("worksGrid");
        let filtered = [...appData.works];
        if (category !== 'all') filtered = filtered.filter(w => w.category === category);
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-state">✨ 暂无作品，管理员可登录后添加</div>`;
            return;
        }
        grid.innerHTML = filtered.map(work => `
            <div class="work-card" data-work-id="${work._id}">
                <div class="media-container">
                    ${work.cover ? `<img src="${work.cover}" alt="封面">` : `<div style="position:absolute; top:0; left:0; width:100%; height:100%; background:#1a1a1a; display:flex; align-items:center; justify-content:center;">无封面</div>`}
                    <div class="play-icon">▶</div>
                </div>
                <div class="work-info">
                    <div class="work-title">${escapeHtml(work.title)}</div>
                    <div class="work-cat">${work.category}</div>
                    <div class="work-desc">${escapeHtml(work.description)}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.work-card').forEach(card => {
            card.addEventListener('click', () => {
                const work = appData.works.find(w => w._id === card.dataset.workId);
                if (work) openVideoModal(work);
            });
        });
    }
    function openVideoModal(work) {
        const modal = document.getElementById('videoModal');
        const titleElem = document.getElementById('modalVideoTitle');
        const descElem = document.getElementById('modalVideoDesc');
        const container = document.getElementById('modalVideoContainer');
        titleElem.innerText = work.title;
        descElem.innerText = work.description;
        container.innerHTML = '';
        if (work.embedCode && work.embedCode.trim()) {
            const parser = new DOMParser();
            const iframeDoc = parser.parseFromString(work.embedCode, 'text/html');
            const iframeSrc = iframeDoc.querySelector('iframe')?.src;
            if (iframeSrc) {
                const iframe = document.createElement('iframe');
                let src = iframeSrc;
                if (src.startsWith('//')) src = 'https:' + src;
                src = src.replace(/[?&]autoplay=1/, '').replace(/[?&]autoplay=0/, '');
                if (!src.includes('?')) src += '?autoplay=0';
                else src += '&autoplay=0';
                iframe.src = src;
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen";
                iframe.allowFullscreen = true;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = '0';
                container.appendChild(iframe);
            } else container.innerHTML = '<div>嵌入代码解析失败</div>';
        } else container.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#aaa;">未配置嵌入代码</div>';
        modal.style.display = 'flex';
    }

    // 管理员界面
    function renderAdminButton() {
        const container = document.getElementById("adminControl");
        if (isAdmin) {
            container.innerHTML = `<button class="admin-btn" id="openAdminBtn">⚙️</button>`;
            document.getElementById("openAdminBtn").addEventListener("click", openAdminModal);
        } else {
            container.innerHTML = `<button class="admin-login-btn" id="showLoginBtn">🔐</button>`;
            document.getElementById("showLoginBtn").addEventListener("click", () => document.getElementById("loginModal").style.display = "flex");
        }
    }
    function renderWorksManager() {
        const container = document.getElementById("worksManager");
        container.innerHTML = appData.works.map((work, idx) => `
            <div class="work-item" data-idx="${idx}">
                <div><strong>${escapeHtml(work.title)}</strong> (${work.category})</div>
                <div style="font-size:0.85rem;">${escapeHtml(work.description.substring(0,80))}</div>
                <div class="work-actions">
                    <button type="button" class="edit-work" data-idx="${idx}">编辑</button>
                    <button type="button" class="delete-work" data-idx="${idx}" style="background:#ef4444;">删除</button>
                </div>
            </div>
        `).join('');
        if (!appData.works.length) container.innerHTML = '<p>暂无作品，点击添加</p>';
        document.querySelectorAll('.edit-work').forEach(btn => btn.addEventListener('click', (e) => openWorkEditor(parseInt(btn.dataset.idx))));
        document.querySelectorAll('.delete-work').forEach(btn => btn.addEventListener('click', async (e) => {
            const idx = parseInt(btn.dataset.idx);
            if (confirm('删除该作品？')) {
                await deleteWorkFromCloud(appData.works[idx]._id);
                await loadWorks();
                renderWorksManager();
                renderFrontend();
            }
        }));
    }
    function openWorkEditor(idx) {
        const work = appData.works[idx];
        if (!work) return;
        currentEditingWorkIndex = idx;
        document.getElementById("workTitle").value = work.title;
        document.getElementById("workCategory").value = work.category;
        document.getElementById("workDesc").value = work.description;
        document.getElementById("workEmbed").value = work.embedCode || '';
        document.getElementById("workCoverUrl").value = work.cover || '';
        const previewDiv = document.getElementById("coverUrlPreview");
        if (work.cover) {
            previewDiv.style.display = 'block';
            previewDiv.querySelector('img').src = work.cover;
        } else previewDiv.style.display = 'none';
        document.getElementById("workEditorModal").style.display = "flex";
    }
    function closeWorkEditor() {
        document.getElementById("workEditorModal").style.display = "none";
        currentEditingWorkIndex = null;
    }
    async function saveWork() {
        if (currentEditingWorkIndex === null) return;
        const title = document.getElementById("workTitle").value.trim();
        if (!title) { showToast("请输入作品标题"); return; }
        const category = document.getElementById("workCategory").value;
        const desc = document.getElementById("workDesc").value;
        const embedCode = document.getElementById("workEmbed").value.trim();
        const coverUrl = document.getElementById("workCoverUrl").value.trim();
        const work = appData.works[currentEditingWorkIndex];
        const isNew = !work._id;
        const success = await saveWorkToCloud({
            id: work._id,
            title, category, description: desc, embedCode, cover: coverUrl
        }, isNew);
        if (success) {
            await loadWorks();
            renderWorksManager();
            renderFrontend();
            closeWorkEditor();
        }
    }
    async function addNewWork() {
        await saveWorkToCloud({
            title: "新作品标题",
            category: "短视频",
            description: "作品描述，可自行修改。",
            embedCode: '<iframe src="https://player.youku.com/embed/请替换视频链接" frameborder="0" allowfullscreen></iframe>',
            cover: ""
        }, true);
        await loadWorks();
        renderWorksManager();
        renderFrontend();
        if (appData.works.length) openWorkEditor(appData.works.length-1);
    }
    // 头像裁剪
    function showCropModal(file) {
        const img = document.getElementById("cropImage");
        const url = URL.createObjectURL(file);
        img.src = url;
        document.getElementById("cropModal").style.display = "flex";
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { aspectRatio:1, viewMode:1, dragMode:'move', cropBoxMovable:true, cropBoxResizable:true });
    }
    function confirmCrop() {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas();
        const base64 = canvas.toDataURL('image/jpeg',0.9);
        appData.avatar = base64;
        if (isAdmin) saveProfileToCloud({ avatar: base64 });
        else showToast("请先登录管理员再保存头像");
        closeCropModal();
        renderAvatar();
        const previewImg = document.getElementById("adminAvatarPreview");
        const previewPlaceholder = document.getElementById("adminAvatarPlaceholder");
        previewImg.src = base64; previewImg.style.display = "block";
        previewPlaceholder.style.display = "none";
    }
    function closeCropModal() {
        document.getElementById("cropModal").style.display = "none";
        if (cropper) { cropper.destroy(); cropper = null; }
    }
    function openAdminModal() {
        document.getElementById("editName").value = appData.name;
        document.getElementById("editBio").value = appData.bio;
        document.getElementById("editContact").value = appData.contact;
        document.getElementById("editSkills").value = appData.skills;
        const previewImg = document.getElementById("adminAvatarPreview");
        const previewPlaceholder = document.getElementById("adminAvatarPlaceholder");
        if (appData.avatar) {
            previewImg.src = appData.avatar;
            previewImg.style.display = "block";
            previewPlaceholder.style.display = "none";
        } else {
            previewImg.style.display = "none";
            previewPlaceholder.style.display = "flex";
        }
        renderWorksManager();
        document.getElementById("adminModal").style.display = "flex";
    }
    function closeAdminModal() { document.getElementById("adminModal").style.display = "none"; }
    async function saveAdminChanges() {
        await saveProfileToCloud({
            name: document.getElementById("editName").value.trim(),
            bio: document.getElementById("editBio").value,
            contact: document.getElementById("editContact").value,
            skills: document.getElementById("editSkills").value,
            avatar: appData.avatar
        });
        await loadProfile();
        renderFrontend();
        closeAdminModal();
    }
    function handleAvatarUpload(file) { if (file) showCropModal(file); }
    function attemptLogin() {
        const pwd = document.getElementById("adminPassword").value;
        if (pwd === "ysy2025") {
            isAdmin = true;
            sessionStorage.setItem("admin","true");
            closeLoginModal();
            renderAdminButton();
            showToast("管理员模式已开启");
        } else showToast("密码错误");
    }
    function logout() {
        isAdmin = false;
        sessionStorage.removeItem("admin");
        renderAdminButton();
        closeAdminModal();
        showToast("已退出登录");
    }
    function closeLoginModal() {
        document.getElementById("loginModal").style.display = "none";
        document.getElementById("adminPassword").value = "";
    }
    function checkAdminStatus() {
        isAdmin = (sessionStorage.getItem("admin") === "true");
        renderAdminButton();
    }
    function setupCoverPreview() {
        const input = document.getElementById("workCoverUrl");
        const previewDiv = document.getElementById("coverUrlPreview");
        if (!previewDiv) return;
        const img = previewDiv.querySelector('img');
        input.addEventListener('input', () => {
            const url = input.value.trim();
            if (url) {
                previewDiv.style.display = 'block';
                img.src = url;
            } else previewDiv.style.display = 'none';
        });
    }

    async function init() {
        await ensureLogin();
        await loadProfile();
        await loadWorks();
        renderFrontend();
        checkAdminStatus();
        setupCoverPreview();
        // 绑定事件
        document.getElementById("submitLoginBtn").addEventListener("click", attemptLogin);
        document.getElementById("closeLoginBtn").addEventListener("click", closeLoginModal);
        document.getElementById("cancelLoginBtn").addEventListener("click", closeLoginModal);
        document.getElementById("closeAdminModalBtn").addEventListener("click", closeAdminModal);
        document.getElementById("cancelAdminBtn").addEventListener("click", closeAdminModal);
        document.getElementById("adminForm").addEventListener("submit", (e) => { e.preventDefault(); saveAdminChanges(); });
        document.getElementById("addWorkBtn").addEventListener("click", addNewWork);
        document.getElementById("avatarUpload").addEventListener("change", (e) => { if(e.target.files && e.target.files[0]) handleAvatarUpload(e.target.files[0]); });
        document.getElementById("closeWorkEditorBtn").addEventListener("click", closeWorkEditor);
        document.getElementById("cancelWorkBtn").addEventListener("click", closeWorkEditor);
        document.getElementById("saveWorkBtn").addEventListener("click", saveWork);
        document.getElementById("closeCropBtn").addEventListener("click", closeCropModal);
        document.getElementById("cancelCropBtn").addEventListener("click", closeCropModal);
        document.getElementById("confirmCropBtn").addEventListener("click", confirmCrop);
        document.getElementById("closeVideoModalBtn").addEventListener("click", () => document.getElementById("videoModal").style.display = "none");
        document.getElementById("logoutBtnInModal").addEventListener("click", logout);
        window.onclick = (e) => {
            if (e.target === document.getElementById("loginModal")) closeLoginModal();
            if (e.target === document.getElementById("adminModal")) closeAdminModal();
            if (e.target === document.getElementById("workEditorModal")) closeWorkEditor();
            if (e.target === document.getElementById("cropModal")) closeCropModal();
            if (e.target === document.getElementById("videoModal")) document.getElementById("videoModal").style.display = "none";
        };
    }
    init();
</script>
</body>
</html>
